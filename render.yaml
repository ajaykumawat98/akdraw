databases:
  - name: akdraw-postgres
    plan: free
    databaseName: akdraw
    user: akdraw

services:
  # Backend API
  - type: web
    name: akdraw-backend
    runtime: node
    plan: free
    autoDeploy: true
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: akdraw-postgres
          property: host
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        value: akdraw
      - key: DB_PASSWORD
        fromDatabase:
          name: akdraw-postgres
          property: password
      - key: DB_NAME
        value: akdraw
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://akdraw.vercel.app
    healthCheckPath: /health
